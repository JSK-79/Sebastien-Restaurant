<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chez Sébastien - Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
    <div class="logo">
        <a href="index.html">Chez Sébastien</a>
    </div>
    <ul>
        <li><a href="index.html">Accueil</a></li>
        <li><a href="menu.html">Menus</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>
<section class="contact">
    <h2>Contactez-nous</h2>

    <div class="formulaire-contenu">
        <div class="champ">
            <label for="nom">Nom</label>
            <input type="text" id="nom" name="nom" placeholder="Votre nom">
        </div>

        <div class="champ">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Votre email">
        </div>

        <div class="champ">
            <label for="telephone">Numéro de téléphone</label>
            <input type="tel" id="telephone" name="telephone" placeholder="Votre numéro">
        </div>

        <div class="champ">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Votre message"></textarea>
        </div>

        <button type="submit" class="bouton">Envoyer le message</button>
    </div>
</section>
<footer>
    <div class="footer-contenu">
        <h3>Chez Sébastien</h3>
        <div class="footer-infos">
            <p>Lun – Sam : 12h – 22h</p>
            <p>123 rue de la Paix, Abidjan</p>
            <p>+225 01 53 00 30 05</p>
        </div>
        <p class="copyright">© 2025 Chez Sébastien</p>
    </div>
</footer>
</body>
</html>
